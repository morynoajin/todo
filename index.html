<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" id="theme-color-meta" content="#2564CF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="할 일">
  <meta name="description" content="할 일 관리 앱">
  <title>할 일</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay" class="overlay" onclick="overlayClick()"></div>

  <div class="app-layout">
    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="brand">할 일</div>
        <button class="icon-btn" onclick="toggleDarkMode()" title="다크/라이트 모드" id="theme-btn">
          <svg class="icon sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon moon-icon hidden" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <div class="search-wrap">
        <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="검색" autocomplete="off" oninput="handleSearch(this.value)">
        <button id="search-clear" class="search-clear hidden" onclick="clearSearch()">✕</button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="myday" onclick="switchView('myday')">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span class="nav-label">나의 하루</span>
          <span class="nav-count" id="cnt-myday"></span>
        </button>
        <button class="nav-item" data-view="important" onclick="switchView('important')">
          <svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span class="nav-label">중요</span>
          <span class="nav-count" id="cnt-important"></span>
        </button>
        <button class="nav-item" data-view="planned" onclick="switchView('planned')">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="nav-label">계획됨</span>
          <span class="nav-count" id="cnt-planned"></span>
        </button>
        <button class="nav-item" data-view="all" onclick="switchView('all')">
          <svg class="icon" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
          <span class="nav-label">전체 작업</span>
          <span class="nav-count" id="cnt-all"></span>
        </button>

        <div class="divider"></div>
        <div id="lists-container"></div>

        <div class="sidebar-btns">
          <button class="add-btn" onclick="showAddListModal()">
            <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            새 목록
          </button>
          <button class="add-btn" onclick="showAddGroupModal()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            새 그룹
          </button>
        </div>
      </nav>
    </aside>

    <!-- ===== MAIN PANEL ===== -->
    <main class="main-panel" id="main-panel">
      <div class="main-header">
        <button class="icon-btn hamburger" onclick="toggleSidebar()" aria-label="메뉴">
          <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 id="view-title">나의 하루</h1>
        <div class="header-actions">
          <button class="icon-btn" onclick="toggleSort()" title="정렬">
            <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
          </button>
          <button class="icon-btn" id="show-done-btn" onclick="toggleShowCompleted()" title="완료 항목">
            <svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="sort-menu" class="sort-menu hidden">
        <button class="sort-opt" data-sort="importance" onclick="setSortBy('importance')">중요도순</button>
        <button class="sort-opt" data-sort="dueDate" onclick="setSortBy('dueDate')">마감일순</button>
        <button class="sort-opt" data-sort="name" onclick="setSortBy('name')">이름순</button>
        <button class="sort-opt" data-sort="created" onclick="setSortBy('created')">생성일순</button>
      </div>

      <div id="task-list" class="task-list"></div>

      <div class="add-task-bar">
        <button class="add-plus" onclick="focusInput()">+</button>
        <input type="text" id="new-task-input" placeholder="작업 추가"
               autocomplete="off" onkeydown="handleNewTaskKey(event)" onfocus="onInputFocus()" onblur="onInputBlur()">
        <button class="icon-btn myday-toggle" id="myday-add-btn" onclick="toggleAddToMyDay()" title="나의 하루에 추가">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </main>

    <!-- ===== DETAIL PANEL ===== -->
    <aside id="detail-panel" class="detail-panel hidden">
      <div id="detail-content"></div>
    </aside>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-bg" class="modal-bg hidden" onclick="closeModal()"></div>
  <div id="modal" class="modal hidden">
    <div id="modal-body"></div>
  </div>

  <!-- ===== CALENDAR POPUP ===== -->
  <div id="cal-popup" class="cal-popup hidden">
    <div id="cal-content"></div>
  </div>

  <!-- ===== CONTEXT MENU ===== -->
  <div id="ctx-menu" class="ctx-menu hidden"></div>

  <script src="app.js"></script>
</body>
</html>
